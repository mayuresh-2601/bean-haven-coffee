<!DOCTYPE html>

<html lang="en">

<head>


    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bean Haven Coffee | Secure Payment</title>

    <!-- Favicon -->
    <link rel="icon" href="image/logo.png">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/payment.css">


</head>

<body>


    <!-- NAVBAR -->

    <header class="header">

        <div class="logo">

            <h1>
                <i class="fa-solid fa-mug-hot"></i>
                Bean Haven Coffee
            </h1>

        </div>

        <nav class="navbar">

            <ul class="nav-menu">

                <li>
                    <a class="nav-link" href="index.html">
                        <i class="fa-solid fa-house"></i> Home
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="about.html">
                        <i class="fa-solid fa-circle-info"></i> About
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="products.html">
                        <i class="fa-solid fa-mug-saucer"></i> Products
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="order.html">
                        <i class="fa-solid fa-cart-shopping"></i> Order
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="blog.html">
                        <i class="fa-solid fa-blog"></i> Blog
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="career.html">
                        <i class="fa-solid fa-briefcase"></i> Career
                    </a>
                </li>

                <li>
                    <a class="nav-link" href="contact.html">
                        <i class="fa-solid fa-phone"></i> Contact
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <!-- PAYMENT SECTION -->

    <section class="payment-section">

        <div class="container">

            <h1 class="section-title">
                <i class="fa-solid fa-lock"></i>
                Secure Payment
            </h1>
            <form class="payment-form" action="#" method="POST">

                <!-- CARD NAME -->

                
                <label>
                    <i class="fa-solid fa-user"></i>
                    Card Holder Name
                </label>

                <input type="text" name="cardname" placeholder="Enter card holder name" required>

                <!-- CARD NUMBER -->

                <label>
                    Card Number
                </label>

                <input type="text" name="cardnumber" placeholder="1234 5678 9012 3456" maxlength="19" pattern="[0-9 ]+"
                    required>

                <!-- EXPIRY DATE -->

                <label>
                    <i class="fa-solid fa-calendar"></i>
                    Expiry Date
                </label>

                <input type="text" name="expiry" placeholder="MM/YY" pattern="[0-9]{2}/[0-9]{2}" required>

                <!-- CVV -->

                <label>
                    <i class="fa-solid fa-shield-halved"></i>
                    CVV
                </label>
                <input type="password" name="cvv" placeholder="123" maxlength="3" pattern="[0-9]{3}" required>

                <!-- BUTTON -->

                <button class="pay-btn" type="submit">

                    <i class="fa-solid fa-credit-card"></i>
                    Pay Now

                </button>

                <div class="payment-icons">

                    <i class="fa-brands fa-cc-visa"></i>
                    <i class="fa-brands fa-cc-mastercard"></i>
                    <i class="fa-brands fa-cc-amex"></i>
                    <i class="fa-brands fa-cc-paypal"></i>

                </div>
            </form>

        </div>

    </section>

    <!-- FOOTER -->


    <footer class="footer">

        <p>
            <i class="fa-solid fa-mug-hot"></i>
            Bean Haven Coffee
        </p>

        <p>
            Fresh Coffee • Friendly Atmosphere • Great Experience ☕
        </p>

        <div class="social-icons">

            <a href="#" class="social-link">
                <i class="fa-brands fa-facebook"></i>
                <span>Facebook</span>
            </a>

            <a href="#" class="social-link">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="#" class="social-link">
                <i class="fa-brands fa-twitter"></i>
                <span>Twitter</span>
            </a>

            <a href="#" class="social-link">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>

        </div>

        <p>
            © 2026 Mayuresh Kasar Bean Haven Coffee
        </p>

    </footer>


</body>

<script src="js/payment.js"></script>

</html>
